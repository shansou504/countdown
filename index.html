<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gray Road Baptist Church | Countdown</title>
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">
    <link rel="stylesheet" href="/css/style.css">
  </head>

  <body>
    <header id="overhang" class="overhang">
      <div id="title" class="title">Gray Road Baptist Church</div>
      <div id="subtitle" class="subtitle"></div>
    </header>

    <main id="panels" class="panels">
      <div id="panel-left" class="panel-left">
        <div id="logo-container" class="logo-container">
          <img id="logo" class="logo" src="/assets/images/logo.png" alt="logo"/>
        </div>
        <div id="countdown" class="countdown">
          <div id="countdown-label" class="countdown-label">Service will begin in</div>
          <div id="countdown-timer" class="countdown-timer">
            <span id="countdown-hours" class="countdown-value">0</span>
            <span id="hours" class="countdown-units">&nbsp;hours&nbsp;</span>
            <span id="countdown-minutes" class="countdown-value">0</span>
            <span id="minutes" class="countdown-units">&nbsp;minutes</span>
            <span id="countdown-seconds" class="countdown-value"></span>
          </div>
          <div id="countdown-message" class="countdown-message"></div>
        </div>
      </div>
      <div id="panel-right" class="panel-right">
        <div id="announcements" class="announcements">
          <img id="announcement" class="announcement" src="" alt="announcement"/>
        </div>
      </div>
    </main>

    <script src="/js/timer.js"></script>
    
  </body>
</html>
